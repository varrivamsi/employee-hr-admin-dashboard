<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Dashboard Login</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- LEFT SECTION -->

    <div class="left-section">

        <div class="dot-pattern"></div>

        <div class="wave"></div>

        <div class="cards">

            <!-- EMPLOYEE CARD -->

            <div class="card">

                <i class="fa-regular fa-user"></i>

                <h2>EMPLOYEE</h2>

                <div class="line"></div>

            </div>

            <!-- ADMIN CARD -->

            <div class="card">

                <i class="fa-solid fa-user-tie"></i>

                <h2>ADMIN</h2>

                <div class="line"></div>

            </div>

        </div>

    </div>

    <!-- RIGHT SECTION -->

    <div class="right-section">

        <div class="login-box" id="rightPanel">

            <!-- FORM START -->

            <form action="login.php"
                  method="POST">

                <!-- LOGO -->

                <div class="logo-section">

                    <img src="image.png"
                         alt="Logo">

                </div>

                <!-- EMPLOYEE ID -->

                <div class="input-box">

                    <i class="fa-regular fa-user"></i>

                    <input type="text"
                           id="employee_id"
                           name="employee_id"
                           placeholder="Employee ID"
                           required>

                </div>

                <!-- PASSWORD -->

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Password"
                           required>

                    <i class="fa-regular fa-eye eye"
                       id="togglePassword"></i>

                </div>

                <!-- CAPTCHA -->

                <div class="g-recaptcha"
                 data-sitekey="6LcfMfQsAAAAAIuUnREHKP7HozKF5FgxJFO5WL4A">
                 </div>

                <!-- LOGIN BUTTON -->

                <button type="submit"
                        class="login-btn">

                    LOGIN

                </button>

                <!-- LINKS -->

               <div class="links">

                <a href="#">Reset Password</a>

                 <span>|</span>

                  <a href="#" onclick="showContact()">Contact HR</a>

                </div>

            </form>

            <!-- FORM END -->

        </div>

    </div>

</div>

<!-- PASSWORD TOGGLE -->

<script>

const password =
document.getElementById("password");

const toggle =
document.getElementById("togglePassword");

toggle.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";

        toggle.classList.remove("fa-eye");

        toggle.classList.add("fa-eye-slash");

    }

    else{

        password.type = "password";

        toggle.classList.remove("fa-eye-slash");

        toggle.classList.add("fa-eye");

    }

});

</script>
<script src="https://www.google.com/recaptcha/api.js"
async defer></script>
<script>

function showContact(){

document.getElementById("rightPanel").innerHTML = `

<div class="logo-section">

<img src="image.png">

</div>

<h2 style="
color:#9b0000;
margin-bottom:30px;
text-align:center;
">
Contact HR
</h2>

<div class="branch">

<h3>L&DC</h3>

<p>+91-XXXXXXXXXX</p>

<p>2nd Floor, HR Block Joining</p>

</div>

<div class="branch">

<h3>Admin Block</h3>

<p>+91-XXXXXXXXXX</p>

<p>Room No. 3 Series, ERP Centre Block</p>

</div>

<div class="branch">

<h3>Signature</h3>

<p>+91-XXXXXXXXXX</p>

<p>3rd Floor, Signature & Reporting</p>

</div>

<div class="working-hours">

<p>Working Hours</p>

<span>10:00 AM - 5:00 PM</span>

<br>

<span>Monday to Saturday</span>

</div>

<a href="login.html" class="back-btn">

Back to Login

</a>

`;

}

</script>
</body>

</html>
