<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Contact HR</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left-section">

        <div class="wave"></div>

        <div class="dot-pattern"></div>

        <h1 style="
        color:#f5e6c8;
        font-size:70px;
        z-index:2;
        ">
            Contact HR
        </h1>

    </div>


    <!-- RIGHT SIDE -->

    <div class="right-section">

        <div class="contact-box">

            <div class="logo-section">

                <img src="image.png"
                alt="Company Logo">

            </div>

            <h2>Contact HR</h2>


            <div class="branch">

                <h3>L&DC</h3>

                <p>+91-XXXXXXXXXX</p>

                <p>2nd Floor, HR Block Joining</p>

            </div>


            <div class="branch">

                <h3>Admin Block</h3>

                <p>+91-XXXXXXXXXX</p>

                <p>Room No. 3 Series, ERP Centre Block</p>

            </div>


            <div class="branch">

                <h3>Signature</h3>

                <p>+91-XXXXXXXXXX</p>

                <p>3rd Floor, Signature & Reporting</p>

            </div>


            <div class="working-hours">

                <p>Working Hours</p>

                <span>10:00 AM - 5:00 PM</span>

                <br>

                <span>Monday to Saturday</span>

            </div>


            <a href="login.html"
            class="back-btn">

                Back to Login

            </a>

        </div>

    </div>

</div>

</body>

</html>
